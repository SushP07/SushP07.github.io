<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
  </defs>
  <style>
    .box {
      fill: #fff;
      stroke: #000;
      stroke-width: 1;
    }
    .text {
      font-family: sans-serif;
      font-size: 14px;
      text-anchor: middle;
    }
    .arrow {
      stroke: #000;
      stroke-width: 1.5;
      marker-end: url(#arrow);
      stroke-dasharray: 10, 5;
      animation: dash 0.5s linear infinite;
    }

    @keyframes dash {
      from {
        stroke-dashoffset: 0;
      }
      to {
        stroke-dashoffset: -15;
      }
    }
  </style>

  <rect width="100%" height="100%" fill="#f0f0f0" />

  <g transform="translate(50, 50)">
    <rect class="box" width="150" height="60" rx="5" />
    <text class="text" x="75" y="35">Environment Setup</text>
  </g>

  <g transform="translate(325, 50)">
    <rect class="box" width="150" height="60" rx="5" />
    <text class="text" x="75" y="35">AWS Configuration</text>
  </g>

  <g transform="translate(600, 50)">
    <rect class="box" width="150" height="60" rx="5" />
    <text class="text" x="75" y="35">S3 Bucket</text>
  </g>

  <g transform="translate(50, 200)">
    <rect class="box" width="150" height="60" rx="5" />
    <text class="text" x="75" y="35">Tracking Server</text>
  </g>

  <g transform="translate(325, 200)">
    <rect class="box" width="150" height="60" rx="5" />
    <text class="text" x="75" y="35">Database Integration</text>
  </g>

  <g transform="translate(600, 200)">
    <rect class="box" width="150" height="60" rx="5" />
    <text class="text" x="75" y="35">Code Integration</text>
  </g>

  <g transform="translate(325, 350)">
    <rect class="box" width="150" height="60" rx="5" />
    <text class="text" x="75" y="35">Model Registry</text>
  </g>

  <path class="arrow" d="M 200 80 L 325 80" />
  <path class="arrow" d="M 475 80 L 600 80" />
  <path class="arrow" d="M 125 110 L 125 200" />
  <path class="arrow" d="M 200 230 L 325 230" />
  <path class="arrow" d="M 475 230 L 600 230" />
  <path class="arrow" d="M 400 260 L 400 350" />
</svg>
