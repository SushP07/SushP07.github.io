<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Background */
    .bg { fill: #0B1019; }
    
    /* Nodes */
    .box { fill: #1E293B; stroke: #334155; stroke-width: 2; rx: 10; }
    .box-ec2 { stroke: #F59E0B; } /* Orange for Compute */
    .box-s3 { stroke: #3B82F6; }  /* Blue for Storage */
    .box-iam { stroke: #10B981; } /* Green for Security */
    
    /* Text */
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #F1F5F9; }
    .title { font-weight: bold; font-size: 16px; text-anchor: middle; }
    .sub { font-size: 12px; fill: #94A3B8; text-anchor: middle; }
    .main-title { font-size: 24px; font-weight: bold; text-anchor: middle; fill: #F8FAFC; }

    /* Animations */
    .flow {
      stroke: #60A5FA;
      stroke-width: 3;
      stroke-dasharray: 10;
      fill: none;
      animation: dash 1s linear infinite;
    }
    @keyframes dash {
      to { stroke-dashoffset: -20; }
    }
    
    /* Static Lines */
    .perm-line { stroke: #10B981; stroke-width: 1; stroke-dasharray: 4; fill: none; opacity: 0.6; }
  </style>

  <rect width="800" height="400" class="bg" rx="15" />
  <text x="400" y="50" class="main-title">MLflow on AWS Architecture</text>

  <g transform="translate(300, 320)">
    <rect width="200" height="60" class="box box-iam" />
    <text x="100" y="25" class="title">AWS IAM</text>
    <text x="100" y="45" class="sub">Roles & Policies</text>
  </g>

  <g transform="translate(50, 120)">
    <rect width="220" height="140" class="box box-ec2" />
    <text x="110" y="30" class="title">AWS EC2</text>
    <text x="110" y="70" class="title" fill="#F59E0B">MLflow Server</text>
    <text x="110" y="90" class="sub">Tracking & Registry</text>
    <text x="110" y="110" class="sub">Port 5000</text>
  </g>

  <g transform="translate(530, 120)">
    <rect width="220" height="140" class="box box-s3" />
    <text x="110" y="30" class="title">AWS S3 Bucket</text>
    <text x="110" y="70" class="sub">Artifact Store</text>
    <text x="110" y="90" class="sub">Models (.pkl)</text>
    <text x="110" y="110" class="sub">Plots & Metrics</text>
  </g>

  <path d="M 270 190 L 530 190" class="flow" />
  <rect x="360" y="170" width="80" height="24" rx="4" fill="#0B1019" stroke="#60A5FA" />
  <text x="400" y="186" class="sub" fill="#60A5FA">Log Data</text>

  <path d="M 320 320 V 260" class="perm-line" />
  <path d="M 480 320 V 260" class="perm-line" />

</svg>
