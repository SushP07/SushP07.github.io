<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
    
    <g id="icon-user">
      <circle cx="15" cy="10" r="5" fill="white"/>
      <path d="M5 25 c0-5 10-5 20 0" stroke="white" stroke-width="2" fill="none"/>
    </g>
    <g id="icon-code">
      <path d="M8 8 L3 15 L8 22 M22 8 L27 15 L22 22" stroke="white" stroke-width="2" fill="none"/>
    </g>
    <g id="icon-server">
      <rect x="5" y="5" width="20" height="20" rx="2" fill="none" stroke="white" stroke-width="2"/>
      <circle cx="20" cy="10" r="1.5" fill="white"/>
    </g>
    <g id="icon-db">
      <ellipse cx="15" cy="6" rx="10" ry="3" stroke="white" stroke-width="2" fill="none"/>
      <path d="M5 6 v12 c0 2 5 3 10 3 s10 -1 10 -3 v-12" stroke="white" stroke-width="2" fill="none"/>
    </g>
    <g id="icon-bucket">
      <path d="M5 8 L8 25 H22 L25 8 Z" fill="none" stroke="white" stroke-width="2"/>
      <ellipse cx="15" cy="8" rx="10" ry="3" stroke="white" stroke-width="2" fill="none"/>
    </g>
  </defs>

  <style>
    .text-title { font-family: sans-serif; font-size: 14px; font-weight: 700; fill: #1e293b; text-anchor: middle; }
    .text-sub { font-family: sans-serif; font-size: 11px; fill: #64748b; text-anchor: middle; }
    
    .box { width: 160px; height: 70px; rx: 8px; stroke-width: 1; }
    .box-code { fill: #EFF6FF; stroke: #3B82F6; }
    .box-infra { fill: #FFF7ED; stroke: #F97316; }
    .box-store { fill: #F0FDF4; stroke: #16A34A; }
    
    .icon-bg { fill-opacity: 1; }
    .icon-bg-blue { fill: #3B82F6; }
    .icon-bg-orange { fill: #F97316; }
    .icon-bg-green { fill: #16A34A; }

    .path-arrow {
      fill: none;
      stroke: #94a3b8;
      stroke-width: 2;
      stroke-dasharray: 8,4;
      marker-end: url(#arrow);
      animation: flow 1s linear infinite;
    }
    @keyframes flow { to { stroke-dashoffset: -12; } }
  </style>

  <rect width="100%" height="100%" fill="#ffffff" />

  <g transform="translate(50, 215)">
    <rect class="box box-code" />
    <circle cx="30" cy="35" r="18" class="icon-bg icon-bg-blue"/>
    <use href="#icon-code" x="15" y="20" />
    <text class="text-title" x="100" y="30">Training Script</text>
    <text class="text-sub" x="100" y="50">Elastic Net Logic</text>
  </g>

  <g transform="translate(320, 215)">
    <rect class="box box-infra" />
    <circle cx="30" cy="35" r="18" class="icon-bg icon-bg-orange"/>
    <use href="#icon-server" x="15" y="20" />
    <text class="text-title" x="100" y="30">MLflow Server</text>
    <text class="text-sub" x="100" y="50">EC2 Gateway</text>
  </g>

  <g transform="translate(600, 100)">
    <rect class="box box-store" />
    <circle cx="30" cy="35" r="18" class="icon-bg icon-bg-green"/>
    <use href="#icon-bucket" x="15" y="20" />
    <text class="text-title" x="100" y="30">Artifact Store</text>
    <text class="text-sub" x="100" y="50">S3 (.pkl models)</text>
  </g>

  <g transform="translate(600, 215)">
    <rect class="box box-store" />
    <circle cx="30" cy="35" r="18" class="icon-bg icon-bg-green"/>
    <use href="#icon-db" x="15" y="20" />
    <text class="text-title" x="100" y="30">Backend Store</text>
    <text class="text-sub" x="100" y="50">Postgres Metrics</text>
  </g>

  <g transform="translate(600, 330)">
    <rect class="box box-infra" />
    <circle cx="30" cy="35" r="18" class="icon-bg icon-bg-orange"/>
    <use href="#icon-server" x="15" y="20" />
    <text class="text-title" x="100" y="30">Model Registry</text>
    <text class="text-sub" x="100" y="50">Version Control</text>
  </g>

  <path class="path-arrow" d="M 210 250 L 312 250" />
  
  <path class="path-arrow" d="M 480 240 C 530 240, 530 135, 592 135" />
  
  <path class="path-arrow" d="M 480 250 L 592 250" />
  
  <path class="path-arrow" d="M 480 260 C 530 260, 530 365, 592 365" />

</svg>
