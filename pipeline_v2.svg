<svg width="850" height="600" viewBox="0 0 850 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="balancedGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fed7aa;stop-opacity:1" /> <stop offset="100%" style="stop-color:#bfdbfe;stop-opacity:1" /> </linearGradient>
    
    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309" /> </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1d4ed8" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2410c" />
    </marker>
  </defs>

  <style>
    .text-title { font-family: sans-serif; font-size: 13px; font-weight: 700; fill: #1e293b; text-anchor: middle; }
    .text-sub { font-family: sans-serif; font-size: 10px; fill: #334155; text-anchor: middle; }
    .label-tag { font-family: sans-serif; font-size: 10px; font-weight: bold; fill: #1e293b; text-anchor: middle; }
    .container-title { font-family: sans-serif; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; fill: #0f172a; }
    
    .box { width: 160px; height: 80px; rx: 10; stroke-width: 2.5; fill: #ffffff; }
    
    .container-local { fill: #f1f5f9; fill-opacity: 0.3; stroke: #3b82f6; stroke-width: 2.5; stroke-dasharray: 8,4; }
    .container-aws { fill: #fff7ed; fill-opacity: 0.3; stroke: #f97316; stroke-width: 2.5; stroke-dasharray: 8,4; }

    .flow-yellow { fill: none; stroke: #b45309; stroke-width: 2; stroke-dasharray: 6,3; marker-end: url(#arrow-yellow); animation: flow 1s linear infinite; }
    .flow-blue { fill: none; stroke: #1d4ed8; stroke-width: 2.5; stroke-dasharray: 6,3; marker-end: url(#arrow-blue); animation: flow 1s linear infinite; }
    .flow-orange { fill: none; stroke: #c2410c; stroke-width: 2; stroke-dasharray: 6,3; marker-end: url(#arrow-orange); animation: flow 1s linear infinite; }
    
    @keyframes flow { to { stroke-dashoffset: -18; } }
  </style>

  <rect width="100%" height="100%" fill="url(#balancedGradient)" rx="15" />

  <g transform="translate(30, 40)">
    <rect width="320" height="520" class="container-local" rx="15" />
    <text x="160" y="-12" class="container-title">Local Development (app.py)</text>

    <g transform="translate(80, 40)">
      <rect class="box" stroke="#fbbf24" />
      <rect x="0" y="0" width="40" height="20" rx="5" fill="#fbbf24" />
      <text x="20" y="14" class="label-tag">DATA</text>
      <text class="text-title" x="80" y="45">Wine Features</text>
      <text class="text-sub" x="80" y="65">pH, Alcohol, Acidity</text>
    </g>

    <g transform="translate(80, 190)">
      <rect class="box" stroke="#fbbf24" />
      <rect x="0" y="0" width="40" height="20" rx="5" fill="#fbbf24" />
      <text x="20" y="14" class="label-tag">FIT</text>
      <text class="text-title" x="80" y="40">Elastic Net Model</text>
      <text class="text-sub" x="80" y="55">Multicollinearity Fix</text>
    </g>

    <g transform="translate(80, 340)">
      <rect class="box" stroke="#3b82f6" />
      <rect x="0" y="0" width="55" height="20" rx="5" fill="#3b82f6" />
      <text x="27.5" y="14" class="label-tag" fill="white">MLFLOW</text>
      <text class="text-title" x="80" y="40">Start Remote Run</text>
      <text class="text-sub" x="80" y="55">Set Tracking URI</text>
    </g>

    <path class="flow-yellow" d="M 160 120 L 160 185" />
    <path class="flow-yellow" d="M 160 270 L 160 335" />
  </g>

  <g transform="translate(480, 40)">
    <rect width="320" height="520" class="container-aws" rx="15" />
    <text x="160" y="-12" class="container-title">AWS Cloud Infrastructure</text>

    <g transform="translate(10, 40)">
      <rect class="box" stroke="#f97316" />
      <rect x="0" y="0" width="40" height="20" rx="5" fill="#f97316" />
      <text x="20" y="14" class="label-tag">AUTH</text>
      <text class="text-title" x="80" y="45">IAM &amp; S3 Setup</text>
      <text class="text-sub" x="80" y="65">Secure Access Keys</text>
    </g>

    <g transform="translate(150, 190)">
      <rect class="box" stroke="#f97316" />
      <rect x="0" y="0" width="40" height="20" rx="5" fill="#f97316" />
      <text x="20" y="14" class="label-tag">HOST</text>
      <text class="text-title" x="80" y="45">EC2 Server</text>
      <text class="text-sub" x="80" y="65">MLflow Listening...</text>
    </g>

    <g transform="translate(80, 340)">
      <rect class="box" stroke="#f97316" stroke-width="4" />
      <rect x="0" y="0" width="70" height="20" rx="5" fill="#f97316" />
      <text x="35" y="14" class="label-tag">SUCCESS</text>
      <text class="text-title" x="80" y="40">MLflow Dashboard</text>
      <text class="text-sub" x="80" y="58">Cloud Storage Sync</text>
    </g>

    <path class="flow-orange" d="M 90 120 C 90 160, 230 150, 230 185" />
    <path class="flow-orange" d="M 230 270 C 230 310, 160 310, 160 335" />
  </g>

  <path class="flow-blue" d="M 330 420 L 555 420" />
  <text x="442" y="410" class="text-title" fill="#1d4ed8" font-style="italic">python app.py</text>
</svg>
