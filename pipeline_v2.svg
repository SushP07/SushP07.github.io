<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
    
    <g id="icon-setup">
      <circle cx="15" cy="15" r="8" stroke="white" stroke-width="2" fill="none"/>
      <path d="M15 5 V2 M15 28 V25 M5 15 H2 M28 15 H25 M8 8 L6 6 M24 24 L22 22 M8 22 L6 24 M24 6 L22 8" stroke="white" stroke-width="2"/>
    </g>
    <g id="icon-cloud">
      <path d="M7 20 A6 6 0 0 1 7 10 A8 8 0 0 1 20 8 A6 6 0 0 1 25 20 H7 Z" fill="white"/>
    </g>
    <g id="icon-bucket">
      <path d="M5 8 L8 25 H22 L25 8 Z" fill="none" stroke="white" stroke-width="2"/>
      <ellipse cx="15" cy="8" rx="10" ry="3" fill="none" stroke="white" stroke-width="2"/>
    </g>
    <g id="icon-server">
      <rect x="5" y="5" width="20" height="20" rx="2" fill="none" stroke="white" stroke-width="2"/>
      <line x1="8" y1="10" x2="22" y2="10" stroke="white" stroke-width="2"/>
      <line x1="8" y1="15" x2="22" y2="15" stroke="white" stroke-width="2"/>
      <circle cx="20" cy="20" r="1.5" fill="white"/>
    </g>
    <g id="icon-db">
      <ellipse cx="15" cy="6" rx="10" ry="3" stroke="white" stroke-width="2" fill="none"/>
      <path d="M5 6 v12 c0 2 5 3 10 3 s10 -1 10 -3 v-12" stroke="white" stroke-width="2" fill="none"/>
      <path d="M5 12 c0 2 5 3 10 3 s10 -1 10 -3" stroke="white" stroke-width="2" fill="none"/>
    </g>
    <g id="icon-code">
      <path d="M8 8 L3 15 L8 22 M22 8 L27 15 L22 22 M12 25 L18 5" stroke="white" stroke-width="2" fill="none"/>
    </g>
  </defs>

  <style>
    /* Clean modern font */
    .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #333; }
    
    /* Box Styles */
    .box-rect { width: 150px; height: 60px; rx: 8px; stroke: #cbd5e1; stroke-width: 1; }
    .box-blue { fill: #EFF6FF; stroke: #3B82F6; }
    .box-orange { fill: #FFF7ED; stroke: #F97316; }
    .box-red { fill: #FEF2F2; stroke: #EF4444; }
    .box-purple { fill: #FAF5FF; stroke: #A855F7; }

    /* Icon Container Circles */
    .icon-circle { fill: #3B82F6; } /* Default Blue */
    .icon-circle-orange { fill: #F97316; }
    .icon-circle-red { fill: #EF4444; }
    .icon-circle-purple { fill: #A855F7; }

    /* Animated Arrows */
    .arrow {
      stroke: #64748b; /* Slate Grey */
      stroke-width: 2;
      marker-end: url(#arrow);
      stroke-dasharray: 8, 4;
      animation: dash 1s linear infinite;
      fill: none;
    }
    @keyframes dash {
      from { stroke-dashoffset: 24; }
      to { stroke-dashoffset: 0; }
    }
  </style>

  <rect width="100%" height="100%" fill="#ffffff" />

  <g transform="translate(50, 50)">
    <rect class="box-rect box-blue" />
    <circle cx="30" cy="30" r="18" class="icon-circle"/>
    <use href="#icon-setup" x="15" y="15" />
    <text class="text" x="95" y="35" text-anchor="middle">Env Setup</text>
  </g>

  <g transform="translate(325, 50)">
    <rect class="box-rect box-orange" />
    <circle cx="30" cy="30" r="18" class="icon-circle-orange"/>
    <use href="#icon-cloud" x="15" y="15" />
    <text class="text" x="95" y="35" text-anchor="middle">AWS Config</text>
  </g>

  <g transform="translate(600, 50)">
    <rect class="box-rect box-red" />
    <circle cx="30" cy="30" r="18" class="icon-circle-red"/>
    <use href="#icon-bucket" x="15" y="15" />
    <text class="text" x="95" y="35" text-anchor="middle">S3 Bucket</text>
  </g>

  <g transform="translate(50, 200)">
    <rect class="box-rect box-purple" />
    <circle cx="30" cy="30" r="18" class="icon-circle-purple"/>
    <use href="#icon-server" x="15" y="15" />
    <text class="text" x="95" y="35" text-anchor="middle">Tracking Svr</text>
  </g>

  <g transform="translate(325, 200)">
    <rect class="box-rect box-blue" />
    <circle cx="30" cy="30" r="18" class="icon-circle"/>
    <use href="#icon-db" x="15" y="15" />
    <text class="text" x="95" y="35" text-anchor="middle">Postgres DB</text>
  </g>

  <g transform="translate(600, 200)">
    <rect class="box-rect box-blue" />
    <circle cx="30" cy="30" r="18" class="icon-circle"/>
    <use href="#icon-code" x="15" y="15" />
    <text class="text" x="95" y="35" text-anchor="middle">ML Code</text>
  </g>

  <g transform="translate(325, 350)">
    <rect class="box-rect box-purple" />
    <circle cx="30" cy="30" r="18" class="icon-circle-purple"/>
    <use href="#icon-server" x="15" y="15" /> <text class="text" x="95" y="35" text-anchor="middle">Model Registry</text>
  </g>

  <path class="arrow" d="M 200 80 L 318 80" />
  
  <path class="arrow" d="M 475 80 L 593 80" />
  
  <path class="arrow" d="M 125 110 L 125 193" />
  
  <path class="arrow" d="M 200 230 L 318 230" />
  
  <path class="arrow" d="M 475 230 L 593 230" />
  
  <path class="arrow" d="M 400 260 L 400 343" />

</svg>
