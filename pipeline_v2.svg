<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" style="background: url(#mediumGrad);">
  <defs>
    <linearGradient id="mediumGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16213a;stop-opacity:1" /> 
      <stop offset="50%" style="stop-color:#213054;stop-opacity:1" /> 
      <stop offset="100%" style="stop-color:#16213a;stop-opacity:1" />
    </linearGradient>

    <filter id="trackGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <path id="mopsPath" d="M 80 160 L 780 160 Q 920 160 920 260 Q 920 360 780 360 L 80 360" />

    <style>
      .node-link { cursor: pointer; text-decoration: none; }
      .node-link:hover { opacity: 0.8; }
      .node-link:hover circle { stroke: #00d4ff; stroke-width: 2px; }
      .node-link:hover text { fill: #00d4ff; }
    </style>
  </defs>

  <rect width="1000" height="500" fill="url(#mediumGrad)" />

  <use href="#mopsPath" fill="none" stroke="#0e1424" stroke-width="85" stroke-linecap="round" />
  <use href="#mopsPath" fill="none" stroke="#00f2ff" stroke-width="2.5" filter="url(#trackGlow)" opacity="0.9" />

  <use href="#mopsPath" fill="none" stroke="#cccccc" stroke-width="2" stroke-dasharray="15,25" opacity="0.4">
    <animate attributeName="stroke-dashoffset" from="400" to="0" dur="1.5s" repeatCount="indefinite" />
  </use>

  <g transform="translate(905, 240)">
    <rect x="0" y="0" width="24" height="24" fill="white" />
    <path d="M0 0h8v8H0zM8 8h8v8H8zM16 0h8v8H16zM0 16h8v8H0zM16 16h8v8H16z" fill="black" />
    <rect x="-2" y="0" width="3" height="40" fill="#aaaaaa" />
  </g>

  <g font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">
    
    <a href="#step-1-data-ingestion" class="node-link">
      <g transform="translate(100, 160)">
        <circle r="15" fill="#00f2ff" opacity="0.15" />
        <path d="M-8 -5 L0 5 L8 -5" fill="none" stroke="#00f2ff" stroke-width="2.5"/>
        <text y="-55">DATA INGESTION</text>
      </g>
    </a>

    <a href="#step-2-preprocessing" class="node-link">
      <g transform="translate(260, 160)">
        <circle r="15" fill="#ff2a6d" opacity="0.15" />
        <path d="M-5 -5 Q0 0 5 -5 M-5 5 Q0 10 5 5" fill="none" stroke="#ff2a6d" stroke-width="2.5"/>
        <text y="-55">PREPROCESSING</text>
      </g>
    </a>

    <a href="#step-3-model-training" class="node-link">
      <g transform="translate(420, 160)">
        <circle r="15" fill="#ffcc00" opacity="0.15" />
        <circle cx="0" cy="0" r="4.5" fill="#ffcc00" />
        <path d="M-10 -10 L10 10 M-10 10 L10 -10" stroke="#ffcc00" stroke-width="1.2"/>
        <text y="-55">TRAINING</text>
      </g>
    </a>

    <a href="#step-4-evaluation" class="node-link">
      <g transform="translate(580, 160)">
        <circle r="15" fill="#00ff88" opacity="0.15" />
        <path d="M-7 0 L-2 5 L7 -5" fill="none" stroke="#00ff88" stroke-width="2.5"/>
        <text y="-55">EVALUATION</text>
      </g>
    </a>

    <a href="#step-5-visualization" class="node-link">
      <g transform="translate(740, 160)">
        <circle r="15" fill="#00f2ff" opacity="0.15" />
        <circle r="6" fill="none" stroke="#00f2ff" stroke-width="2"/>
        <text y="-55">VISUALIZATION</text>
      </g>
    </a>

    <a href="#-project-architecture" class="node-link">
      <g transform="translate(600, 360)">
        <circle r="15" fill="#ff2a6d" opacity="0.15" />
        <rect x="-8" y="-8" width="16" height="16" stroke="#ff2a6d" fill="none"/>
        <text y="45">EXPERIMENT TRACKING</text>
      </g>
    </a>

    <a href="#-project-architecture" class="node-link">
      <g transform="translate(250, 360)">
        <circle r="15" fill="#00ff88" opacity="0.15" />
        <ellipse cx="0" cy="0" rx="10" ry="4.5" stroke="#00ff88" fill="none"/>
        <text y="45">MODEL STORAGE</text>
      </g>
    </a>
  </g>

  <g>
    <rect x="-22" y="-9" width="45" height="18" rx="3" fill="#000d5a" /> 
    <rect x="-22" y="-12" width="5" height="24" fill="#e30613" /> 
    <path d="M 15 -9 L 26 0 L 15 9 Z" fill="#ffcc00" /> 
    
    <rect x="-14" y="-13" width="10" height="5" rx="1" fill="white" />
    <rect x="-14" y="8" width="10" height="5" rx="1" fill="white" />
    <rect x="10" y="-12" width="9" height="4" rx="1" fill="white" />
    <rect x="10" y="8" width="9" height="4" rx="1" fill="white" />
    
    <rect x="-3" y="-2" width="11" height="4" fill="#e30613" />

    <animateMotion dur="18s" repeatCount="indefinite" rotate="auto" keyTimes="0; 0.1; 0.15; 0.25; 0.3; 0.4; 0.45; 0.55; 0.6; 0.75; 0.8; 0.95; 1" 
                   calcMode="linear">
      <mpath href="#mopsPath" />
    </animateMotion>
  </g>
</svg>
