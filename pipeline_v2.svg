<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Dark Mode Background */
    .bg { fill: #0B1019; }
    
    /* Box Styles */
    .box { fill: #1E293B; stroke: #334155; stroke-width: 2; rx: 10; }
    .box-highlight { stroke: #60A5FA; stroke-width: 3; } /* For active nodes */
    
    /* Text Styles */
    text { font-family: Arial, sans-serif; fill: #F1F5F9; }
    .label-title { font-weight: bold; font-size: 16px; text-anchor: middle; }
    .label-sub { font-size: 12px; fill: #94A3B8; text-anchor: middle; }

    /* The Data Flow Animation (Step 5) */
    .flow-line {
      fill: none;
      stroke: #60A5FA; /* Blue stream */
      stroke-width: 3;
      stroke-dasharray: 10;
      animation: flow 1s linear infinite;
    }
    @keyframes flow {
      to { stroke-dashoffset: -20; }
    }
    
    /* Permission Line (Step 1) */
    .iam-line { stroke: #4ADE80; stroke-width: 2; stroke-dasharray: 5; fill: none; opacity: 0.6; }
  </style>

  <rect width="800" height="400" class="bg" rx="15" />
  <text x="400" y="40" class="label-title" font-size="20">AWS MLflow Architecture</text>

  <g transform="translate(50, 100)">
    <rect width="200" height="150" class="box box-highlight" />
    <text x="100" y="30" class="label-title">AWS EC2</text>
    <text x="100" y="70" class="label-title" fill="#60A5FA">MLflow Server</text>
    <text x="100" y="90" class="label-sub">Exp. Tracking</text>
    <text x="100" y="110" class="label-sub">Model Registry</text>
  </g>

  <g transform="translate(550, 100)">
    <rect width="200" height="150" class="box" stroke="#F59E0B" />
    <text x="100" y="30" class="label-title">AWS S3</text>
    <text x="100" y="70" class="label-sub">Artifact Store</text>
    <text x="100" y="90" class="label-sub">Models & Plots</text>
  </g>

  <g transform="translate(300, 300)">
    <rect width="200" height="60" class="box" stroke="#4ADE80" />
    <text x="100" y="25" class="label-title">AWS IAM</text>
    <text x="100" y="45" class="label-sub">Permissions & Roles</text>
  </g>

  <path d="M 250 175 L 550 175" class="flow-line" />
  <rect x="350" y="150" width="100" height="25" rx="5" fill="#0B1019" />
  <text x="400" y="167" class="label-sub">Log Artifacts</text>

  <path d="M 300 330 H 150 V 250" class="iam-line" />
  <path d="M 500 330 H 650 V 250" class="iam-line" />

</svg>
