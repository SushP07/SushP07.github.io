<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" rx="15" fill="#0B1019"/>
  
  <path d="M260 200 H380" stroke="#60A5FA" stroke-width="2" stroke-dasharray="5,5">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2s" repeatCount="indefinite" />
  </path>
  <text x="320" y="190" fill="#94A3B8" font-family="Arial" font-size="10" text-anchor="middle">Log Params/Metrics</text>

  <path d="M260 220 Q 320 280 580 220" stroke="#60A5FA" stroke-width="2" stroke-dasharray="5,5" fill="none">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2s" repeatCount="indefinite" />
  </path>
  <text x="420" y="260" fill="#94A3B8" font-family="Arial" font-size="10" text-anchor="middle">Upload Artifacts</text>

  <path d="M440 240 V320" stroke="#60A5FA" stroke-width="2" stroke-dasharray="5,5">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2s" repeatCount="indefinite" />
  </path>
  <text x="445" y="285" fill="#94A3B8" font-family="Arial" font-size="10" text-anchor="start">Store Metadata</text>


  <text x="400" y="40" fill="white" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">MLflow on AWS Architecture</text>


  <rect x="30" y="70" width="250" height="350" rx="10" fill="none" stroke="#334155" stroke-width="1"/>
  <text x="155" y="100" fill="white" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Local Development</text>

  <rect x="50" y="120" width="210" height="60" rx="8" fill="#1E293B" stroke="#4B8BBE" stroke-width="2"/>
  <text x="155" y="145" fill="white" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">ML Code & Data</text>
  <text x="155" y="165" fill="#94A3B8" font-family="Arial" font-size="10" text-anchor="middle">(Python, Scikit-learn)</text>

  <rect x="50" y="190" width="210" height="60" rx="8" fill="#1E293B" stroke="#0093E9" stroke-width="2"/>
  <text x="155" y="215" fill="white" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">MLflow Client</text>
  <text x="155" y="235" fill="#94A3B8" font-family="Arial" font-size="10" text-anchor="middle">(mlflow, boto3)</text>

  <rect x="50" y="280" width="210" height="120" rx="8" fill="#1E293B" stroke="#F59E0B" stroke-width="2"/>
  <text x="155" y="305" fill="white" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">Environment Variables</text>
  <text x="60" y="330" fill="#94A3B8" font-family="monospace" font-size="10">MLFLOW_TRACKING_URI</text>
  <text x="60" y="350" fill="#94A3B8" font-family="monospace" font-size="10">AWS_ACCESS_KEY_ID</text>
  <text x="60" y="370" fill="#94A3B8" font-family="monospace" font-size="10">AWS_SECRET_ACCESS_KEY</text>


  <rect x="340" y="70" width="430" height="350" rx="10" fill="none" stroke="#FF9900" stroke-width="1"/>
  <text x="555" y="100" fill="white" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">AWS Cloud</text>

  <rect x="380" y="120" width="160" height="120" rx="8" fill="#1E293B" stroke="#FF9900" stroke-width="2"/>
  <text x="460" y="145" fill="white" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">EC2 Instance</text>
  <text x="460" y="165" fill="#94A3B8" font-family="Arial" font-size="10" text-anchor="middle">(Tracking Server)</text>
  <text x="460" y="190" fill="#94A3B8" font-family="monospace" font-size="10" text-anchor="middle">Port 5000</text>
  <text x="460" y="210" fill="#94A3B8" font-family="monospace" font-size="10" text-anchor="middle">Public IP/DNS</text>

  <rect x="580" y="120" width="160" height="120" rx="8" fill="#1E293B" stroke="#FF5722" stroke-width="2"/>
  <text x="660" y="145" fill="white" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">S3 Bucket</text>
  <text x="660" y="165" fill="#94A3B8" font-family="Arial" font-size="10" text-anchor="middle">(Artifact Store)</text>
  <text x="660" y="190" fill="#94A3B8" font-family="Arial" font-size="10" text-anchor="middle">Models, Plots</text>
  <text x="660" y="210" fill="#94A3B8" font-family="monospace" font-size="10" text-anchor="middle">s3://mlflow-testing-07</text>

  <rect x="380" y="320" width="160" height="80" rx="8" fill="#1E293B" stroke="#326CE5" stroke-width="2"/>
  <text x="460" y="345" fill="white" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">RDS Instance</text>
  <text x="460" y="365" fill="#94A3B8" font-family="Arial" font-size="10" text-anchor="middle">(PostgreSQL)</text>
  <text x="460" y="385" fill="#94A3B8" font-family="Arial" font-size="10" text-anchor="middle">MLflow Metadata</text>

  <rect x="580" y="320" width="160" height="80" rx="8" fill="#1E293B" stroke="#F59E0B" stroke-width="2"/>
  <text x="660" y="345" fill="white" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">IAM</text>
  <text x="660" y="365" fill="#94A3B8" font-family="Arial" font-size="10" text-anchor="middle">(Access Control)</text>
  <text x="660" y="385" fill="#94A3B8" font-family="Arial" font-size="10" text-anchor="middle">Permissions for S3, EC2, RDS</text>

  <path d="M660 320 V280 H460 V240" stroke="#4ADE80" stroke-width="1" fill="none" stroke-dasharray="4"/>
  <path d="M660 320 V280 H660 V240" stroke="#4ADE80" stroke-width="1" fill="none" stroke-dasharray="4"/>
  <text x="560" y="275" fill="#4ADE80" font-family="Arial" font-size="10" text-anchor="middle">IAM Permissions</text>

</svg>
