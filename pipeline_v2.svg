<svg width="600" height="200" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* This defines the dashed line */
    .flow-line {
      fill: none;
      stroke: #333;
      stroke-width: 3;
      stroke-dasharray: 10; /* Size of dashes */
      animation: flow 1s linear infinite; /* Run the animation named 'flow' */
    }

    /* This defines the movement */
    @keyframes flow {
      from { stroke-dashoffset: 20; }
      to { stroke-dashoffset: 0; }
    }
    
    /* Simple box styling */
    .box { fill: #f0f0f0; stroke: #333; stroke-width: 2; }
    text { font-family: Arial, sans-serif; font-size: 14px; }
  </style>

  <rect x="10" y="50" width="100" height="50" class="box" />
  <text x="35" y="80">User</text>

  <rect x="400" y="50" width="100" height="50" class="box" />
  <text x="420" y="80">Server</text>

  <path d="M 110 75 L 400 75" class="flow-line" />
</svg>
